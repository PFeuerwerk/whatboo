name: CD - Pending Cloud Configuration

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pending:
    name: Deployment intentionally paused
    runs-on: ubuntu-latest
    steps:
      - name: Explain CD status
        run: |
          echo "CD is intentionally paused."
          echo "Choose cloud provider, registry, runtime, secrets strategy and OIDC before enabling deployment."
          echo "Current CI already validates, tests, builds application artifacts and exports Docker images."
