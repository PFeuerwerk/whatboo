version: 2

updates:

  # ===========================================================================
  # Root workspace (pnpm)
  # ===========================================================================

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:00"
      timezone: "Europe/Madrid"

    open-pull-requests-limit: 5

    labels:
      - dependencies

    commit-message:
      prefix: "deps"

  # ===========================================================================
  # Backend (NestJS)
  # ===========================================================================

  - package-ecosystem: "npm"
    directory: "/apps/api"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:15"
      timezone: "Europe/Madrid"

    open-pull-requests-limit: 5

    labels:
      - backend
      - dependencies

    commit-message:
      prefix: "deps(api)"

  # ===========================================================================
  # Frontend (Angular)
  # ===========================================================================

  - package-ecosystem: "npm"
    directory: "/apps/web"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:30"
      timezone: "Europe/Madrid"

    open-pull-requests-limit: 5

    labels:
      - frontend
      - dependencies

    commit-message:
      prefix: "deps(web)"

  # ===========================================================================
  # GitHub Actions
  # ===========================================================================

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:45"
      timezone: "Europe/Madrid"

    labels:
      - github-actions

    commit-message:
      prefix: "ci"
