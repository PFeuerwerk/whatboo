<script src="https://unpkg.com"></script>
<link href="https://googleapis.com" rel="stylesheet">

<style>
  * { font-family: 'Geist', sans-serif !important; -webkit-font-smoothing: antialiased; }
</style>

<div class="p-6 md:p-10 max-w-5xl mx-auto space-y-6 animate-fade-in">
  
  <div class="border-b border-slate-200/80 pb-4">
    <h1 class="text-2xl font-black text-slate-900 tracking-tight leading-none">Miembros del Equipo</h1>
    <p class="text-xs text-slate-400 font-semibold mt-1.5">Gestione los accesos del personal y asigne roles jerárquicos restringidos.</p>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
    <!-- Alta Staff -->
    <div class="bg-white border border-slate-200 rounded-2xl p-5 shadow-xs space-y-4 h-fit">
      <h3 class="text-xs font-black text-slate-400 uppercase tracking-wider border-b border-slate-100 pb-1.5">Invitar al Personal</h3>
      <div class="space-y-3">
        <div class="space-y-1">
          <label class="block text-[10px] font-bold text-slate-600 uppercase tracking-wider">Correo electrónico</label>
          <input type="email" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-xs font-bold outline-none focus:border-blue-500" placeholder="maitre@restaurante.com">
        </div>
        <div class="space-y-1">
          <label class="block text-[10px] font-bold text-slate-600 uppercase tracking-wider">Rol asignado</label>
          <select class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-xs font-bold outline-none focus:border-blue-500">
            <option>MANAGER</option>
            <option selected>STAFF / MAÎTRE</option>
          </select>
        </div>
        <button class="w-full bg-slate-900 hover:bg-slate-800 text-white font-bold py-2.5 px-4 rounded-xl text-[10px] uppercase tracking-wider transition-colors pt-3">Generar Credencial de Acceso</button>
      </div>
    </div>

    <!-- Lista de Miembros -->
    <div class="lg:col-span-2 bg-white border border-slate-200 rounded-2xl overflow-hidden shadow-xs">
      <table class="w-full text-left border-collapse">
        <thead>
          <tr class="bg-slate-50 border-b border-slate-200/80 text-[10px] font-bold text-slate-400 uppercase tracking-wider">
            <th class="p-4">Nombre completo</th>
            <th class="p-4">Rol</th>
            <th class="p-4">Estado</th>
          </tr>
        </thead>
        <tbody class="text-xs font-semibold text-slate-700 divide-y divide-slate-100">
          <tr>
            <td class="p-4">Rene Admin</td>
            <td class="p-4"><span class="px-2 py-0.5 rounded bg-blue-50 text-blue-600 font-bold text-[10px]">OWNER</span></td>
            <td class="p-4"><span class="text-emerald-600 font-bold text-[10px] uppercase">Activo</span></td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

</div>
